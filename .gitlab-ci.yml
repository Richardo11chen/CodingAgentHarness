stages:
  - test
  - build
  - deploy

unit-test:
  stage: test
  image: node:22-slim
  script:
    - npm ci
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t coding-agent-harness .
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  script:
    - echo "Deploy to Render via webhook"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
